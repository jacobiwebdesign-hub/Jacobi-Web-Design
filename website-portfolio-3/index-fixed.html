<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBSIDIAN – Next-Gen Gaming Accessories</title>

  <!-- Base & Page Styles -->
  <link rel="stylesheet" href="./base-fixed.css" />
  <link rel="stylesheet" href="./index-fixed.css" />
</head>

<body>

  <!-- =========================
       HEADER / NAVIGATION
  ========================== -->
  <header class="site-header">
    <div class="container nav-wrapper">

      <div class="logo">
        OBSIDIAN
      </div>

      <nav class="nav-icons">
        <a href="#" class="icon-link">
          <img src="../image/website-portfolio-3-image/search-icon.png" alt="Search" />
        </a>
        <a href="#" class="icon-link">
          <img src="../image/website-portfolio-3-image/cart-icon.png" alt="Cart" />
        </a>
      </nav>

    </div>
  </header>


  <!-- =========================
       HERO SPLASH SECTION
  ========================== -->
  <main>
    <section class="hero">

      <div class="container hero-content">

        <p class="brand-tag">OBSIDIAN</p>

        <h1 class="hero-title">
          Next-Gen Gaming Accessories.
        </h1>

        <p class="hero-subtitle">
          Elevate your game with cutting-edge gear built for the ultimate experience.
        </p>

        <div class="hero-actions">
          <a href="/website-portfolio-3/home-page/home-fixed.html" class="btn btn-light">Explore</a>
          <a href="#" class="btn btn-light">Shop Now</a>
        </div>

      </div>

      <!-- Product Layer -->
      <div class="hero-products container">
        <img src="/image/website-portfolio-3-image/controller-clean.png"
             class="product controller"
             alt="Nova Pro Controller" />

        <img src="/image/website-portfolio-3-image/console-clean.png"
             class="product console"
             alt="Nova X Console" />

        <img src="/image/website-portfolio-3-image/headset-clean.png"
             class="product headset"
             alt="Nova Wave Headset" />
      </div>

    </section>
  </main>

</body>
</html>
